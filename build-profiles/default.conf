# YasserOS default build profile
# Pass to pi-gen: source build-profiles/default.conf && ./build-docker.sh

# Image name
IMG_NAME="yasseros"
RELEASE="bookworm"
DEPLOY_ZIP=1
LOCALE_DEFAULT="en_GB.UTF-8"
TARGET_HOSTNAME="yasseros"

# User
FIRST_USER_NAME="yasser"
FIRST_USER_PASS=""

# Timezone
TIMEZONE_DEFAULT="UTC"

# Keyboard
KEYBOARD_KEYMAP="us"
KEYBOARD_LAYOUT="English (US)"

# GPU memory split (MB) — minimum for desktop use
GPU_MEM=128

# Enable camera
ENABLE_SSH=0
CAMERA_ENABLE=0

# pi-gen stage control
STAGE_LIST="stage0 stage1 stage2 stage-yasseros"
