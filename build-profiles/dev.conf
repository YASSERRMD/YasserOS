# YasserOS development build profile
# Includes SSH access, verbose logging, and dev tools
# source build-profiles/dev.conf && ./build-docker.sh

source "$(dirname "$0")/default.conf"

# Override for dev
IMG_NAME="yasseros-dev"
TARGET_HOSTNAME="yasseros-dev"
ENABLE_SSH=1
FIRST_USER_PASS="yasseros"

# More GPU memory for dev/testing
GPU_MEM=256
