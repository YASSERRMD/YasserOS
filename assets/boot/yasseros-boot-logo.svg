<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg" width="400" height="120">
  <defs>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4493F8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#A371F7;stop-opacity:1"/>
    </linearGradient>
    <!-- Glow filter for the icon mark -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon mark: stylised "Y" in a hexagon-ish shape -->
  <g transform="translate(20, 10)" filter="url(#glow)">
    <!-- Outer ring -->
    <circle cx="50" cy="50" r="46" fill="none" stroke="url(#text-grad)" stroke-width="2" opacity="0.6"/>
    <!-- Inner Y letterform -->
    <line x1="50" y1="28" x2="33" y2="44" stroke="#4493F8" stroke-width="5" stroke-linecap="round"/>
    <line x1="50" y1="28" x2="67" y2="44" stroke="#A371F7" stroke-width="5" stroke-linecap="round"/>
    <line x1="50" y1="44" x2="50" y2="72" stroke="url(#text-grad)" stroke-width="5" stroke-linecap="round"/>
    <!-- Tiny accent dot -->
    <circle cx="50" cy="80" r="3" fill="#4493F8" opacity="0.7"/>
  </g>

  <!-- Wordmark: YasserOS -->
  <text x="135" y="65"
        font-family="'DejaVu Sans', 'Liberation Sans', Arial, sans-serif"
        font-weight="700"
        font-size="44"
        fill="url(#text-grad)"
        letter-spacing="-1">YasserOS</text>

  <!-- Tagline -->
  <text x="137" y="90"
        font-family="'DejaVu Sans', 'Liberation Sans', Arial, sans-serif"
        font-weight="400"
        font-size="14"
        fill="#E6EDF3"
        opacity="0.55"
        letter-spacing="3">RASPBERRY PI EDITION</text>
</svg>
