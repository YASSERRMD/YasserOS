<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#040609;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0D1117;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg-dark)"/>
  <!-- Minimal accent line -->
  <line x1="0" y1="540" x2="1920" y2="540" stroke="#4493F8" stroke-width="1" opacity="0.06"/>
  <!-- Corner accent -->
  <g opacity="0.08" fill="#A371F7">
    <circle cx="200" cy="200" r="3"/>
    <circle cx="240" cy="180" r="2"/>
    <circle cx="180" cy="240" r="2"/>
  </g>
