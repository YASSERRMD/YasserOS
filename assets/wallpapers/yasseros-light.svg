<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F6F8FA;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#EAEEF2;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent-light" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0969DA;stop-opacity:0.0"/>
      <stop offset="50%" style="stop-color:#0969DA;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#0969DA;stop-opacity:0.0"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg-light)"/>
  <rect x="0" y="500" width="1920" height="80" fill="url(#accent-light)"/>
  <g opacity="0.06" stroke="#0969DA" stroke-width="1" fill="none">
    <line x1="480" y1="0" x2="480" y2="1080"/>
    <line x1="1440" y1="0" x2="1440" y2="1080"/>
    <line x1="0" y1="270" x2="1920" y2="270"/>
    <line x1="0" y1="810" x2="1920" y2="810"/>
  </g>
</svg>
