<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1400" viewBox="0 0 2400 1400" role="img" aria-labelledby="title desc">
  <title id="title">YasserOS Architecture</title>
  <desc id="desc">A professional software architecture diagram for YasserOS showing the runtime stack, build system, CI quality checks, and optional tools.</desc>
  <defs>
    <style>
      :root {
        --bg: #0D1117;
        --panel: #161B22;
        --border: #30363D;
        --blue: #4493F8;
        --violet: #A371F7;
        --snow: #E6EDF3;
        --muted: #8B949E;
        --green: #3FB950;
      }
      .bg { fill: var(--bg); }
      .panel { fill: var(--panel); stroke: var(--border); stroke-width: 2.5; }
      .card { fill: #10161f; stroke: var(--border); stroke-width: 2.5; }
      .layer { fill: #10161f; stroke-width: 4; }
      .blue-stroke { stroke: var(--blue); }
      .violet-stroke { stroke: var(--violet); }
      .green-stroke { stroke: var(--green); }
      .muted-stroke { stroke: var(--border); }
      .snow-stroke { stroke: var(--snow); }
      .debian-stroke { stroke: #D70A53; }
      .heading {
        fill: var(--snow);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        font-weight: 760;
        letter-spacing: 0;
      }
      .body {
        fill: var(--snow);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        font-weight: 580;
        letter-spacing: 0;
      }
      .muted {
        fill: var(--muted);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        font-weight: 500;
        letter-spacing: 0;
      }
      .mono {
        fill: var(--muted);
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-weight: 520;
        letter-spacing: 0;
      }
      .mono-snow {
        fill: var(--snow);
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-weight: 620;
        letter-spacing: 0;
      }
      .small {
        font-size: 25px;
        line-height: 1.3;
      }
      .tiny {
        font-size: 22px;
        line-height: 1.3;
      }
      .section-label {
        fill: var(--muted);
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-weight: 700;
        font-size: 28px;
        letter-spacing: 0;
      }
      .arrow-blue {
        fill: none;
        stroke: var(--blue);
        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .arrow-green {
        fill: none;
        stroke: var(--green);
        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .dash {
        stroke-dasharray: 14 13;
      }
    </style>
    <marker id="arrow-blue" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L16,9 L2,16 Z" fill="#4493F8"/>
    </marker>
    <marker id="arrow-green" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L16,9 L2,16 Z" fill="#3FB950"/>
    </marker>
  </defs>

  <rect class="bg" width="2400" height="1400"/>
  <path d="M120 252 H2280" stroke="#30363D" stroke-width="1.5" opacity="0.55"/>
  <path d="M120 1268 H2280" stroke="#30363D" stroke-width="1.5" opacity="0.55"/>

  <text x="120" y="82" class="section-label">ARCHITECTURE  ·  v0.1.0-alpha</text>
  <text x="120" y="156" class="heading" font-size="70">YasserOS Architecture</text>

  <rect x="80" y="190" width="1360" height="1060" rx="14" class="panel"/>
  <rect x="1480" y="190" width="840" height="1060" rx="14" class="panel"/>

  <text x="140" y="255" class="heading" font-size="42">Runtime Stack</text>
  <text x="1525" y="255" class="heading" font-size="42">Build, Quality, and Tools</text>

  <!-- Runtime stack: bottom to top -->
  <g id="runtime-stack">
    <rect x="140" y="300" width="1240" height="120" rx="8" class="layer snow-stroke"/>
    <text x="180" y="350" class="body" font-size="32">User Desktop</text>
    <text x="412" y="350" class="mono" font-size="30">·  XFCE 4  ·  Whisker Menu · Terminal · Browser · Docs Portal</text>

    <rect x="140" y="445" width="1240" height="165" rx="8" class="layer violet-stroke"/>
    <text x="180" y="500" class="body" font-size="34">Yasser Control Center</text>
    <text x="565" y="500" class="mono-snow" font-size="30">·  ycc  ·  GTK4 / libadwaita / Python</text>
    <text x="180" y="554" class="muted small">About · System Info · Lab Mode · AI Workspace · Projects · Notes · Pi Checker</text>

    <rect x="140" y="635" width="1240" height="240" rx="8" fill="#111b2a" stroke="#4493F8" stroke-width="5"/>
    <text x="180" y="695" class="mono-snow" font-size="36">stage-yasseros</text>
    <text x="520" y="695" class="body" font-size="34">·  Custom pi-gen Stage</text>
    <text x="180" y="755" class="muted small">XFCE 4 desktop · LightDM greeter · Plymouth boot splash · XFCONF defaults</text>
    <text x="180" y="803" class="muted small">skel/.bashrc · First-boot systemd service</text>

    <rect x="140" y="900" width="1240" height="130" rx="8" class="layer debian-stroke"/>
    <text x="180" y="963" class="body" font-size="34">Raspberry Pi OS</text>
    <text x="485" y="963" class="mono" font-size="30">·  Debian Bookworm  ·  base: stage0 + stage1 + stage2</text>

    <rect x="140" y="1055" width="1240" height="140" rx="8" class="layer muted-stroke"/>
    <text x="180" y="1115" class="body" font-size="34">Raspberry Pi 4 / 5 Hardware</text>
    <text x="690" y="1115" class="mono" font-size="30">·  BCM2711 / BCM2712  ·  arm64 / aarch64</text>
  </g>

  <!-- Right side cards -->
  <g id="right-cards">
    <text x="1525" y="307" class="section-label">Build System</text>
    <rect x="1525" y="330" width="238" height="190" rx="8" class="card blue-stroke"/>
    <text x="1555" y="385" class="mono-snow" font-size="32">pi-gen</text>
    <text x="1555" y="430" class="muted tiny">Upstream RPi builder</text>
    <text x="1555" y="466" class="muted tiny">Docker-based</text>
    <text x="1555" y="502" class="muted tiny">Produces .img.xz</text>

    <rect x="1780" y="330" width="238" height="190" rx="8" class="card violet-stroke"/>
    <text x="1810" y="385" class="mono-snow" font-size="30">build-alpha.sh</text>
    <text x="1810" y="430" class="muted tiny">Loads build profile</text>
    <text x="1810" y="466" class="muted tiny">Creates SKIP files</text>
    <text x="1810" y="502" class="muted tiny">Runs pi-gen</text>

    <rect x="2035" y="330" width="238" height="190" rx="8" class="card muted-stroke"/>
    <text x="2065" y="385" class="body" font-size="31">Build Profiles</text>
    <text x="2065" y="430" class="mono tiny">default.conf</text>
    <text x="2065" y="466" class="mono tiny">dev.conf</text>
    <text x="2065" y="502" class="mono tiny">minimal.conf</text>

    <text x="1525" y="585" class="section-label">CI / Quality</text>
    <rect x="1525" y="610" width="365" height="190" rx="8" class="card green-stroke"/>
    <text x="1555" y="665" class="body" font-size="33">GitHub Actions</text>
    <text x="1555" y="710" class="muted small">3 jobs: pytest + ruff</text>
    <text x="1555" y="752" class="muted small">shellcheck</text>
    <text x="1555" y="794" class="muted small">desktop-file-validate</text>

    <rect x="1910" y="610" width="365" height="190" rx="8" class="card green-stroke"/>
    <text x="1940" y="665" class="body" font-size="33">Test Suite</text>
    <text x="1940" y="710" class="mono tiny">186 passed</text>
    <text x="1940" y="752" class="mono tiny">4 skipped (GTK)</text>
    <text x="1940" y="794" class="mono tiny">pytest</text>

    <text x="1525" y="865" class="section-label">Optional Tools</text>
    <rect x="1525" y="890" width="365" height="94" rx="8" class="card muted-stroke"/>
    <text x="1555" y="949" class="mono-snow" font-size="28">yos-install-docker</text>

    <rect x="1910" y="890" width="365" height="94" rx="8" class="card muted-stroke"/>
    <text x="1940" y="949" class="mono-snow" font-size="28">yos-install-vscode</text>

    <rect x="1525" y="1008" width="365" height="94" rx="8" class="card muted-stroke"/>
    <text x="1555" y="1067" class="mono-snow" font-size="28">yos-security-baseline</text>

    <rect x="1910" y="1008" width="365" height="94" rx="8" class="card muted-stroke"/>
    <text x="1940" y="1067" class="mono-snow" font-size="28">yos-update</text>
  </g>

  <!-- Arrows -->
  <path d="M1525 425 C1472 458, 1442 565, 1384 720" class="arrow-blue dash" marker-end="url(#arrow-blue)"/>
  <path d="M760 875 L760 895" class="arrow-blue" marker-end="url(#arrow-blue)"/>
  <path d="M1899 520 L1899 552 L1644 552 L1644 524" class="arrow-blue" marker-end="url(#arrow-blue)"/>
  <path d="M1890 705 L1907 705" class="arrow-green" marker-end="url(#arrow-green)"/>

  <text x="120" y="1340" class="muted" font-size="28">55 phases · Debian Bookworm · arm64 · https://github.com/YASSERRMD/YasserOS</text>
</svg>
