# stage-yasseros configuration
# Sourced by 01-run.sh and 01-run-chroot.sh for stage-level settings.

# YasserOS version (set at build time or override here)
YASSEROS_VERSION="${YASSEROS_VERSION:-v0.0.1-alpha}"

# Default user configuration
YASSEROS_USER="${FIRST_USER_NAME:-yasser}"
YASSEROS_HOSTNAME="${TARGET_HOSTNAME:-yasseros}"

# Desktop configuration
YASSEROS_ICON_THEME="Papirus-Dark"
YASSEROS_GTK_THEME="Greybird-dark"
YASSEROS_CURSOR_THEME="Adwaita"
YASSEROS_FONT="Cantarell 10"
YASSEROS_MONOSPACE_FONT="JetBrains Mono 11"

# Wallpaper
YASSEROS_DEFAULT_WALLPAPER="/usr/share/yasseros/wallpapers/yasseros-default-1920.png"

# LightDM
YASSEROS_SESSION="xfce"
YASSEROS_GREETER="lightdm-gtk-greeter"

# First boot
YASSEROS_FIRSTBOOT_SENTINEL="/var/lib/yasseros/.firstboot-complete"

# Paths
YASSEROS_DATA_DIR="/usr/share/yasseros"
YASSEROS_WALLPAPER_DIR="${YASSEROS_DATA_DIR}/wallpapers"
YASSEROS_CONFIG_DIR="/etc/yasseros"
