<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Deep space background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="60%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#161B22"/>
    </linearGradient>
    <!-- Accent glow gradient -->
    <radialGradient id="glowBlue" cx="30%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#4493F8;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#0D1117;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glowViolet" cx="75%" cy="65%" r="45%">
      <stop offset="0%" style="stop-color:#A371F7;stop-opacity:0.07"/>
      <stop offset="100%" style="stop-color:#0D1117;stop-opacity:0"/>
    </radialGradient>
    <!-- Y lettermark gradient -->
    <linearGradient id="yGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4493F8"/>
      <stop offset="100%" style="stop-color:#A371F7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  <!-- Color glow overlays -->
  <rect width="1920" height="1080" fill="url(#glowBlue)"/>
  <rect width="1920" height="1080" fill="url(#glowViolet)"/>

  <!-- Subtle grid lines -->
  <g stroke="#30363D" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="360" x2="1920" y2="360"/>
    <line x1="0" y1="720" x2="1920" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="1080"/>
    <line x1="1280" y1="0" x2="1280" y2="1080"/>
  </g>

  <!-- Center Y logo — large watermark -->
  <g transform="translate(810, 340)" opacity="0.15">
    <!-- Y arms -->
    <line x1="0" y1="0" x2="150" y2="180" stroke="url(#yGrad)" stroke-width="40" stroke-linecap="round"/>
    <line x1="300" y1="0" x2="150" y2="180" stroke="url(#yGrad)" stroke-width="40" stroke-linecap="round"/>
    <line x1="150" y1="180" x2="150" y2="400" stroke="url(#yGrad)" stroke-width="40" stroke-linecap="round"/>
  </g>

  <!-- Bottom wordmark -->
  <text x="960" y="980"
    font-family="'JetBrains Mono', 'DejaVu Sans Mono', monospace"
    font-size="18"
    fill="#4493F8"
    opacity="0.5"
    text-anchor="middle"
    letter-spacing="6">YasserOS</text>
</svg>
