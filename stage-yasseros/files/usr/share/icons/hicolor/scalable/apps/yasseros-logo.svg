<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- YasserOS logo: deep space background circle with "Y" lettermark -->
  <circle cx="32" cy="32" r="30" fill="#0D1117"/>
  <circle cx="32" cy="32" r="30" fill="none" stroke="#4493F8" stroke-width="2"/>
  <!-- Y lettermark in YasserBlue/Violet gradient -->
  <defs>
    <linearGradient id="yGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4493F8"/>
      <stop offset="100%" style="stop-color:#A371F7"/>
    </linearGradient>
  </defs>
  <!-- Left arm of Y -->
  <line x1="20" y1="16" x2="32" y2="32" stroke="url(#yGrad)" stroke-width="5" stroke-linecap="round"/>
  <!-- Right arm of Y -->
  <line x1="44" y1="16" x2="32" y2="32" stroke="url(#yGrad)" stroke-width="5" stroke-linecap="round"/>
  <!-- Stem of Y -->
  <line x1="32" y1="32" x2="32" y2="48" stroke="url(#yGrad)" stroke-width="5" stroke-linecap="round"/>
</svg>
