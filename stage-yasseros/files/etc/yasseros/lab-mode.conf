# YasserOS Lab Mode Configuration
# Located at /etc/yasseros/lab-mode.conf (system-wide defaults)
# Users can override at ~/.config/yasseros/lab-mode.conf

# Default projects directory
projects_dir=/home/yasser/Projects

# Documentation directory (local offline docs)
docs_dir=/usr/share/yasseros/docs

# Preferred terminal emulator
terminal=xfce4-terminal

# Editor preference
editor=mousepad
